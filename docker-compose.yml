services:

  pc_postgres:
    image: postgres:latest
    container_name: pc_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pc_admin
      POSTGRES_PASSWORD: pc_password
      POSTGRES_DB: promo_constructor
    volumes:
      - ./volumes/pc_postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U pc_admin -d promo_constructor" ]
      interval: 3s
      timeout: 3s
      retries: 3
    networks:
      - promo-constructor-network

  pc_pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pc_pgadmin
    ports:
      - "5444:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: pc_pgadmin_admin@cheetos.com
      PGADMIN_DEFAULT_PASSWORD: pc_pgadmin_password
    volumes:
      - ./volumes/pc_pgadmin:/var/lib/pgadmin
    depends_on:
      - pc_postgres
    networks:
      - promo-constructor-network

  pc_ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:0.30.10}
    container_name: pc_ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:${OLLAMA_PORT:-11434}:11434"
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
      OLLAMA_NO_CLOUD: "1"
      OLLAMA_CONTEXT_LENGTH: "${OLLAMA_CONTEXT_LENGTH:-1792}"
      OLLAMA_KEEP_ALIVE: "${OLLAMA_KEEP_ALIVE:-10m}"
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_QUEUE: "${OLLAMA_MAX_QUEUE:-8}"
      OLLAMA_FLASH_ATTENTION: "1"
      OLLAMA_KV_CACHE_TYPE: "q8_0"
    volumes:
      - ./volumes/pc_ollama:/root/.ollama
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "OLLAMA_HOST=127.0.0.1:11434 ollama list >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    cpus: "${OLLAMA_CPUS:-3.0}"
    mem_limit: "${OLLAMA_MEMORY_LIMIT:-2304m}"
    networks:
      - promo-constructor-network

  pc_ollama_model_init:
    image: ${OLLAMA_IMAGE:-ollama/ollama:0.30.10}
    profiles:
      - ollama-init
    depends_on:
      pc_ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: "http://pc_ollama:11434"
    entrypoint: ["ollama"]
    command: ["pull", "${OLLAMA_MODEL:-qwen3:1.7b}"]
    volumes:
      - ./volumes/pc_ollama:/root/.ollama
    networks:
      - promo-constructor-network


networks:
  promo-constructor-network:
    name: promo-constructor-network
