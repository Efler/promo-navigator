services:

  pc_postgres:
    image: postgres:16-alpine
    container_name: pc_postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - pc_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - promo-constructor-network

  pc_pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pc_pgadmin
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PGADMIN_PORT:-5444}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: "${PGADMIN_DEFAULT_EMAIL}"
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_DEFAULT_PASSWORD}"
    depends_on:
      pc_postgres:
        condition: service_healthy
    volumes:
      - pc_pgadmin_data:/var/lib/pgadmin
    networks:
      - promo-constructor-network

  pc_ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:0.30.10}
    container_name: pc_ollama
    restart: unless-stopped
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
      OLLAMA_NO_CLOUD: "1"
      OLLAMA_CONTEXT_LENGTH: "${OLLAMA_CONTEXT_LENGTH:-1792}"
      OLLAMA_KEEP_ALIVE: "${OLLAMA_KEEP_ALIVE:-10m}"
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_QUEUE: "${OLLAMA_MAX_QUEUE:-8}"
      OLLAMA_FLASH_ATTENTION: "1"
      OLLAMA_KV_CACHE_TYPE: "q8_0"
    volumes:
      - pc_ollama_data:/root/.ollama
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "OLLAMA_HOST=127.0.0.1:11434 ollama list >/dev/null 2>&1",
        ]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 30s
    cpus: "${OLLAMA_CPUS:-3.0}"
    mem_limit: "${OLLAMA_MEMORY_LIMIT:-2304m}"
    stop_grace_period: 30s
    networks:
      - promo-constructor-network

  pc_ollama_model_init:
    image: ${OLLAMA_IMAGE:-ollama/ollama:0.30.10}
    profiles:
      - ollama-init
    depends_on:
      pc_ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: "http://pc_ollama:11434"
    entrypoint: ["ollama"]
    command: ["pull", "${OLLAMA_MODEL:-qwen3:1.7b}"]
    volumes:
      - pc_ollama_data:/root/.ollama
    networks:
      - promo-constructor-network

  pc_backend:
    image: ${BACKEND_IMAGE:-promo-constructor-backend:latest}
    container_name: pc_backend
    restart: unless-stopped
    depends_on:
      pc_postgres:
        condition: service_healthy
      pc_ollama:
        condition: service_healthy
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    environment:
      PROJECT_NAME: "${BACKEND_PROJECT_NAME:-Promo Constructor Backend}"
      VERSION: "${BACKEND_VERSION:-0.1.0}"
      ENVIRONMENT: "${BACKEND_ENVIRONMENT:-production}"
      API_V1_PREFIX: "${BACKEND_API_V1_PREFIX:-/api/v1}"
      DATABASE_URL: "postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pc_postgres:5432/${POSTGRES_DB}"
      SECRET_KEY: "${BACKEND_SECRET_KEY}"
      JWT_ALGORITHM: "${BACKEND_JWT_ALGORITHM:-HS256}"
      ACCESS_TOKEN_EXPIRE_MINUTES: "${BACKEND_ACCESS_TOKEN_EXPIRE_MINUTES:-7200}"
      REFRESH_TOKEN_EXPIRE_MINUTES: "${BACKEND_REFRESH_TOKEN_EXPIRE_MINUTES:-7200}"
      ACCESS_COOKIE_NAME: "${BACKEND_ACCESS_COOKIE_NAME:-pc_access_token}"
      REFRESH_COOKIE_NAME: "${BACKEND_REFRESH_COOKIE_NAME:-pc_refresh_token}"
      COOKIE_SECURE: "${BACKEND_COOKIE_SECURE:-true}"
      COOKIE_SAMESITE: "${BACKEND_COOKIE_SAMESITE:-lax}"
      BACKEND_CORS_ORIGINS: '${BACKEND_CORS_ORIGINS:-["http://localhost"]}'
      API_ADMIN_PROTECTION_ENABLED: "${API_ADMIN_PROTECTION_ENABLED:-true}"
      API_ADMIN_KEY: "${API_ADMIN_KEY:-}"
      FRONTEND_INTERNAL_API_KEY: "${FRONTEND_INTERNAL_API_KEY:-}"
      OLLAMA_BASE_URL: "http://pc_ollama:11434"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-qwen3:1.7b}"
      OLLAMA_CONNECT_TIMEOUT_SECONDS: "${OLLAMA_CONNECT_TIMEOUT_SECONDS:-3}"
      OLLAMA_READ_TIMEOUT_SECONDS: "${OLLAMA_READ_TIMEOUT_SECONDS:-120}"
      OLLAMA_QUEUE_WAIT_TIMEOUT_SECONDS: "${OLLAMA_QUEUE_WAIT_TIMEOUT_SECONDS:-5}"
      OLLAMA_KEEP_ALIVE: "${OLLAMA_KEEP_ALIVE:-10m}"
      OLLAMA_NUM_CTX: "${OLLAMA_CONTEXT_LENGTH:-1792}"
      OLLAMA_NUM_PREDICT: "${OLLAMA_NUM_PREDICT:-112}"
      OLLAMA_TEMPERATURE: "0"
      OLLAMA_SEED: "${OLLAMA_SEED:-42}"
      OLLAMA_USER_MESSAGE_MAX_CHARS: "${OLLAMA_USER_MESSAGE_MAX_CHARS:-2600}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - promo-constructor-network

  pc_frontend:
    image: ${FRONTEND_IMAGE:-promo-constructor-frontend:latest}
    container_name: pc_frontend
    restart: unless-stopped
    depends_on:
      pc_backend:
        condition: service_healthy
    environment:
      FRONTEND_SERVER_NAMES: "${FRONTEND_SERVER_NAMES:-_}"
      CERTBOT_CERT_NAME: "${CERTBOT_CERT_NAME:-}"
      FRONTEND_INTERNAL_API_KEY: "${FRONTEND_INTERNAL_API_KEY:-}"
    ports:
      - "${FRONTEND_HTTP_PORT:-80}:80"
      - "${FRONTEND_HTTPS_PORT:-443}:443"
    volumes:
      - letsencrypt_etc:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    networks:
      - promo-constructor-network

  certbot:
    image: certbot/certbot:v5.5.0
    profiles:
      - certbot
    volumes:
      - letsencrypt_etc:/etc/letsencrypt
      - letsencrypt_var:/var/lib/letsencrypt
      - certbot_webroot:/var/www/certbot
    networks:
      - promo-constructor-network

networks:
  promo-constructor-network:
    name: promo-constructor-network

volumes:
  pc_postgres_data:
  pc_pgadmin_data:
  pc_ollama_data:
  letsencrypt_etc:
  letsencrypt_var:
  certbot_webroot:
